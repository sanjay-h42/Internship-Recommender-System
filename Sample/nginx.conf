server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy Spring Boot backend API calls
    location /api/ {
        proxy_pass http://spring-backend:8080/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        # Forward cookies for OAuth session
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # Proxy OAuth2 authorization initiation to Spring Boot backend
    location /oauth2/ {
        proxy_pass http://spring-backend:8080/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # Proxy OAuth2 callback from Google back to Spring Boot
    location /login/oauth2/ {
        proxy_pass http://spring-backend:8080/login/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # Proxy login endpoint (Spring Security redirects)
    location /login {
        proxy_pass http://spring-backend:8080/login;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
    }

    # Proxy Python recommendation service
    location /recommendations/ {
        proxy_pass http://python-service:5000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
